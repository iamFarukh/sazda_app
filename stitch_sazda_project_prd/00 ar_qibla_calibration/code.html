<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .infinity-path {
            stroke-dasharray: 500;
            stroke-dashoffset: 500;
            animation: draw 3s linear infinite;
        }
        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }
        .phone-float {
            animation: move-infinity 4s ease-in-out infinite;
        }
        @keyframes move-infinity {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(40px, -20px) rotate(15deg); }
            50% { transform: translate(0, 0) rotate(0deg); }
            75% { transform: translate(-40px, 20px) rotate(-15deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body text-on-surface overflow-hidden">
<!-- AR Background Simulation -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="first-person view of a modern minimalist living room with large windows, soft afternoon sunlight, and clean geometric furniture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB1zZSJyJfPaJiWe81yD-cYxhCLxxe9ZxnEYlTpnko8tD5U7S94yDw0qXQ0NmN3YqgPVTSfldscBr6Totm6hqcGfClR0I_fL8okivBvlzk6ayFLktaH9KmM5BJ1k0M_NYmkpyOPFz7rMOwZfpu5v98wcHhW-VBKuBaSTVSQjkK8ZW9zsrKPs-JXEMBJqdACvPLEEM7oSrhbP9i7avlQVB6yBA_qP_4DhW1x-sEcM3gHMU97142tBxvtrDaEESV5Zjapru0otV7xEZ4"/>
<!-- Dark Green Semi-Transparent Overlay -->
<div class="absolute inset-0 bg-primary/60 backdrop-blur-[2px]"></div>
</div>
<!-- Top Navigation (Shell Implementation) -->
<header class="fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center bg-stone-50/80 dark:bg-stone-900/80 backdrop-blur-xl">
<div class="flex items-center gap-4">
<button class="text-emerald-900 dark:text-emerald-500 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="text-xl font-bold text-emerald-900 dark:text-emerald-100 font-manrope tracking-tight">Qibla Finder</h1>
</div>
<button class="text-emerald-900 dark:text-emerald-500 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Calibration Canvas -->
<main class="relative z-10 h-screen flex flex-col items-center justify-center px-8 text-center">
<!-- Instructional Visual -->
<div class="relative w-64 h-64 mb-12 flex items-center justify-center">
<!-- Infinity Symbol Path (Faded Background) -->
<svg class="absolute inset-0 w-full h-full opacity-20" viewbox="0 0 100 50">
<path d="M25,25 C25,10 40,10 50,25 C60,40 75,40 75,25 C75,10 60,10 50,25 C40,40 25,40 25,25" fill="none" stroke="white" stroke-width="2"></path>
</svg>
<!-- Active Infinity Path -->
<svg class="absolute inset-0 w-full h-full" viewbox="0 0 100 50">
<path class="infinity-path" d="M25,25 C25,10 40,10 50,25 C60,40 75,40 75,25 C75,10 60,10 50,25 C40,40 25,40 25,25" fill="none" stroke="white" stroke-width="2"></path>
</svg>
<!-- Floating Phone Illustration -->
<div class="phone-float relative z-20">
<div class="w-16 h-32 rounded-2xl border-[3px] border-on-primary bg-primary/20 backdrop-blur-md flex items-center justify-center">
<div class="w-10 h-1 bg-on-primary/30 rounded-full absolute top-3"></div>
<span class="material-symbols-outlined text-on-primary text-3xl" data-icon="vibration">vibration</span>
<div class="w-4 h-4 rounded-full border-2 border-on-primary absolute bottom-3"></div>
</div>
</div>
</div>
<!-- Instructional Text Cluster -->
<div class="max-w-xs space-y-4">
<h2 class="text-2xl font-headline font-extrabold text-on-primary tracking-tight">Calibrating...</h2>
<p class="text-lg text-on-primary/80 font-medium leading-relaxed">
                Move your phone in a figure-eight pattern
            </p>
</div>
<!-- Calibration Progress Indicator -->
<div class="mt-16 w-full max-w-xs h-1.5 bg-on-primary/20 rounded-full overflow-hidden">
<div class="h-full w-1/3 bg-secondary-container rounded-full shadow-[0_0_15px_rgba(254,214,91,0.5)]"></div>
</div>
<p class="mt-4 text-[11px] font-label font-semibold uppercase tracking-widest text-on-primary/60">Accuracy: Low</p>
</main>
<!-- Contextual Status Card (Floating) -->
<div class="fixed top-24 left-6 right-6 z-20">
<div class="bg-surface-container-lowest/10 backdrop-blur-md p-4 rounded-xl flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container text-xl" data-icon="sensors">sensors</span>
</div>
<div class="text-left">
<p class="text-xs font-label text-on-primary/70 uppercase tracking-wider">Compass Status</p>
<p class="text-sm font-headline font-bold text-on-primary">Interference detected</p>
</div>
</div>
</div>
<!-- Bottom Navigation (Shell Implementation) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-8 pb-6 pt-4 bg-stone-50/80 dark:bg-stone-900/80 backdrop-blur-xl shadow-[0_-12px_40px_rgba(6,78,59,0.06)] rounded-t-[3rem]">
<div class="flex flex-col items-center justify-center bg-emerald-900 dark:bg-emerald-800 text-stone-50 rounded-full p-3 scale-110 -translate-y-2 transition-all">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
<span class="text-[11px] font-manrope font-semibold uppercase tracking-widest mt-1">AR Finder</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 p-2 hover:text-emerald-700 dark:hover:text-emerald-300">
<span class="material-symbols-outlined" data-icon="map">map</span>
<span class="text-[11px] font-manrope font-semibold uppercase tracking-widest mt-1">Map</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 p-2 hover:text-emerald-700 dark:hover:text-emerald-300">
<span class="material-symbols-outlined" data-icon="schedule">schedule</span>
<span class="text-[11px] font-manrope font-semibold uppercase tracking-widest mt-1">Times</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 p-2 hover:text-emerald-700 dark:hover:text-emerald-300">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
<span class="text-[11px] font-manrope font-semibold uppercase tracking-widest mt-1">Sanctuary</span>
</div>
</nav>
