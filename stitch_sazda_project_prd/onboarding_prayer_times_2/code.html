<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sazda - Onboarding</title>

              "surface-container-lowest": "#ffffff",
              "on-surface": "#1b1d0e",
              "error-container": "#ffdad6",
              "on-surface-variant": "#404944",
              "surface-dim": "#dbdcc3",
              "primary-container": "#064e3b",
              "on-tertiary-container": "#c9ae8c",
              "inverse-on-surface": "#f2f2d9",
              "surface-tint": "#2b6954"

            fontFamily: {
              "headline": ["Manrope"],

            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .asymmetric-shape {
            clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 0% 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col items-center justify-center selection:bg-secondary-container selection:text-on-secondary-container">
<!-- Main Onboarding Container -->
<main class="relative w-full max-w-[430px] min-h-screen bg-surface flex flex-col overflow-hidden">
<!-- Header / Skip Action -->
<header class="flex justify-end p-8 z-20">
<button class="text-secondary font-label font-semibold tracking-wide hover:opacity-70 transition-opacity">
                Skip
            </button>
</header>
<!-- Visual Hero Section (Asymmetric Editorial Style) -->
<section class="relative flex-grow flex items-center justify-center px-10">
<!-- Background Decorative Halo -->
<div class="absolute w-[120%] h-[60%] bg-surface-container-low asymmetric-shape -rotate-3 -z-10 translate-y-[-10%]"></div>
<div class="relative w-full aspect-square flex items-center justify-center">
<!-- Main Illustration Card -->
<div class="w-72 h-72 bg-surface-container-lowest rounded-xl shadow-[0_12px_40px_rgba(6,78,59,0.04)] flex items-center justify-center relative overflow-hidden">
<!-- Abstract Geometric Pattern Layer -->
<div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(#003527 1px, transparent 1px); background-size: 20px 20px;"></div>
<!-- Iconic Representation -->
<div class="flex flex-col items-center gap-6 relative z-10">
<div class="w-32 h-32 bg-primary-container rounded-full flex items-center justify-center shadow-lg shadow-primary/10">
<span class="material-symbols-outlined text-secondary-container text-6xl" data-icon="mosque">mosque</span>
</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-secondary text-3xl" data-icon="star_rate" style="font-variation-settings: 'FILL' 1;">star_rate</span>
<span class="material-symbols-outlined text-secondary text-3xl opacity-40" data-icon="star_rate">star_rate</span>
<span class="material-symbols-outlined text-secondary text-3xl" data-icon="star_rate" style="font-variation-settings: 'FILL' 1;">star_rate</span>
</div>
</div>
<!-- Floating Accent Component (Bento-style detail) -->
<div class="absolute -bottom-4 -right-4 bg-secondary-container p-4 rounded-lg shadow-md flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl" data-icon="schedule">schedule</span>
<span class="text-primary font-bold text-xs uppercase tracking-widest">Fajr 05:12</span>
</div>
</div>
</div>
</section>
<!-- Content & Navigation Section -->
<section class="p-10 pb-16 flex flex-col gap-8 bg-surface-container-lowest rounded-t-xl z-10 shadow-[0_-12px_40px_rgba(0,0,0,0.02)]">
<div class="space-y-4">
<h1 class="font-headline text-4xl font-extrabold text-primary leading-tight tracking-tight">
                    Accurate Prayer Times
                </h1>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-[85%]">
                    Stay connected to your daily prayers with precise timings based on your location.
                </p>
</div>
<!-- Pagination Dots -->
<div class="flex gap-2.5">
<div class="h-2 w-8 bg-primary-container rounded-full"></div>
<div class="h-2 w-2 bg-surface-container-highest rounded-full"></div>
<div class="h-2 w-2 bg-surface-container-highest rounded-full"></div>
</div>
<!-- Action Button -->
<div class="mt-4">
<button class="w-full bg-primary-container text-on-primary py-5 rounded-full font-headline font-bold text-lg flex items-center justify-center gap-3 hover:bg-primary transition-all duration-300 shadow-xl shadow-primary/10 group">
                    Next
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</section>
<!-- Decorative Floor -->
<div class="h-2 bg-secondary-container w-full shrink-0"></div>
</main>
<!-- Invisible Metadata for Image Generation Context -->
<div class="hidden">

</div>
</body></html>
