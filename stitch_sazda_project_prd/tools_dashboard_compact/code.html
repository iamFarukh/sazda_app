<body class="bg-background text-on-background font-body min-h-screen pb-24">
<!-- Top Navigation Bar -->
<header class="bg-[#fbfbe2] dark:bg-emerald-950/20 text-emerald-900 dark:text-emerald-50 sticky top-0 z-50 border-b border-primary/5">

<div class="flex items-center gap-3">
<button class="material-symbols-outlined text-emerald-900 dark:text-emerald-50 hover:bg-emerald-100/50 p-1.5 rounded-full">menu</button>
<h1 class="text-emerald-900 dark:text-emerald-100 font-manrope font-extrabold tracking-tighter text-xl">Sazda</h1>

<h2 class="font-headline text-2xl font-extrabold text-white tracking-tight mb-2">Islamic Toolkit</h2>

                </p>

<button class="flex flex-col items-center justify-center p-4 bg-surface-container-low rounded-2xl transition-all active:scale-95 hover:bg-surface-container-high border border-primary/5 group">
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center mb-3 group-hover:bg-primary group-hover:text-on-primary transition-colors">

</div>
<span class="font-headline font-bold text-sm text-primary">Qibla Finder</span>
</button>

<button class="flex flex-col items-center justify-center p-4 bg-surface-container-low rounded-2xl transition-all active:scale-95 hover:bg-surface-container-high border border-primary/5 group">

<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center mb-3 group-hover:bg-primary group-hover:text-on-primary transition-colors">

<span class="material-symbols-outlined text-2xl">map</span>
</div>
<span class="font-headline font-bold text-sm text-primary">Mosque Map</span>
</button>

<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center mb-3 group-hover:bg-primary group-hover:text-on-primary transition-colors">
<span class="material-symbols-outlined text-2xl">calendar_month</span>
</div>
<span class="font-headline font-bold text-sm text-primary">Hijri Date</span>
</button>

<button class="flex flex-col items-center justify-center p-4 bg-surface-container-low rounded-2xl transition-all active:scale-95 hover:bg-surface-container-high border border-primary/5 group">
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center mb-3 group-hover:bg-primary group-hover:text-on-primary transition-colors">
<span class="material-symbols-outlined text-2xl">mosque</span>
</div>
<span class="font-headline font-bold text-sm text-primary">Hajj Guide</span>

<span class="font-plus-jakarta text-[9px] font-bold uppercase mt-0.5">Social</span>
