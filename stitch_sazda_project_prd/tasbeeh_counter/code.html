<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden border border-outline-variant/20">

<section class="w-full max-w-md flex flex-col items-center text-center mt-4">
<div class="bg-surface-container-lowest/60 backdrop-blur-sm px-4 py-1.5 rounded-full mb-6 border border-outline-variant/10">
<span class="text-xs font-label font-bold tracking-widest uppercase text-secondary">Currently Reciting</span>
</div>
<h2 class="font-headline font-extrabold text-3xl text-primary tracking-tight">SubhanAllah</h2>
<p class="text-on-surface-variant text-sm mt-2 font-medium">Glory be to Allah</p>
</section>
<!-- The Large Counter & Tap Area -->
<section class="relative w-full max-w-md flex flex-col items-center justify-center gap-12">
<!-- Progress Counter -->
<div class="flex flex-col items-center">
<div class="flex items-baseline gap-2">
<span class="font-headline font-extrabold text-8xl text-primary-container tracking-tighter">33</span>
<span class="font-headline font-bold text-3xl text-on-surface-variant/40">/ 100</span>
</div>
</div>
<!-- Main Interaction Sphere -->
<div class="relative group cursor-pointer">
<!-- Outer Ring Decoration -->
<div class="absolute -inset-8 border border-primary/5 rounded-full animate-pulse"></div>
<div class="absolute -inset-4 border border-primary/10 rounded-full"></div>
<!-- Main Tap Button -->
<button class="tap-active w-64 h-64 rounded-full bg-gradient-to-br from-primary to-primary-container shadow-[0_24px_60px_rgba(6,78,59,0.25)] flex items-center justify-center relative overflow-hidden focus:outline-none">
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/black-paper.png')] opacity-20"></div>
<!-- Ripple/Light effect -->
<div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-white/10 to-transparent pointer-events-none"></div>
<span class="material-symbols-outlined text-surface text-6xl" data-icon="touch_app" data-weight="fill" style="font-variation-settings: 'FILL' 1;">touch_app</span>
</button>
</div>
</section>
<!-- Tools & Settings (Bento-style layout) -->
<section class="w-full max-w-md grid grid-cols-2 gap-4 mt-8">

<button class="flex flex-col items-center justify-center bg-surface-container-low p-6 rounded-xl hover:bg-surface-container transition-colors group">
<span class="material-symbols-outlined text-primary mb-2 transition-transform group-hover:rotate-180 duration-500" data-icon="refresh">refresh</span>
<span class="font-label font-semibold text-xs uppercase tracking-widest text-on-surface">Reset</span>
</button>
<!-- Haptic Card -->
<button class="flex flex-col items-center justify-center bg-surface-container-low p-6 rounded-xl hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-secondary mb-2" data-icon="vibration" data-weight="fill" style="font-variation-settings: 'FILL' 1;">vibration</span>

<button class="flex-1 py-3 px-4 rounded-full font-label font-bold text-xs text-surface">99</button>
<button class="flex-1 py-3 px-4 rounded-full font-label font-bold text-xs text-on-primary-container hover:bg-surface/5 transition-colors">1000</button>
